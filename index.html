
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>SoloGrinder - Hunter Quest System</title>
    <!-- Orbitron (bold, futuristic), Inter (readable) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600&display=swap">
    <meta name="description" content="Solo Leveling Hunter Quest Tracker - Level up your daily habits!" />
    <meta name="author" content="Lovable" />
    <meta property="og:title" content="SoloGrinder - Hunter Quest System" />
    <meta property="og:description" content="Solo Leveling inspired quest tracker. Level up your daily habits!" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="/icon-512.png" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SoloGrinder" />
    
    <!-- PWA Links -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    
    <!-- Splash Screen -->
    <style>
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease;
      }
      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-black">
    <div id="splash-screen">
      <div class="text-center">
        <img src="/icon-192.png" alt="SoloGrinder Logo" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 20px; border: 2px solid #00d4ff;" />
        <h1 style="color: #00d4ff; font-family: 'Orbitron', sans-serif; font-size: 24px; margin: 0;">SoloGrinder</h1>
        <p style="color: #0080ff; font-family: 'Orbitron', sans-serif; font-size: 14px; margin: 10px 0 0 0;">Initializing Hunter System...</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
      
      // Hide splash screen after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 500);
          }
        }, 1500);
      });
    </script>
  </body>
</html>
